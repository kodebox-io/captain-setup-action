name: "Setup Python"

inputs:
  install-zuzu-dependencies:
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        architecture: "x64"

    - name: Setup uv
      shell: bash
      run: |
        pip install uv
        python --version ; uv --version

    - name: zz deps_django
      if: inputs.install-zuzu-dependencies == 'true'
      shell: bash
      run: |
        ./zz deps_django
